apiVersion: apps/v1
kind: Deployment
metadata:
  name: instantdeploy-postgres
  namespace: instantdeploy
  labels:
    app: instantdeploy-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instantdeploy-postgres
  template:
    metadata:
      labels:
        app: instantdeploy-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: instantdeploy-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d instantdeploy"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d instantdeploy"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: instantdeploy-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: instantdeploy
spec:
  selector:
    app: instantdeploy-postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
