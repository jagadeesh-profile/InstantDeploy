apiVersion: apps/v1
kind: Deployment
metadata:
  name: instantdeploy-redis
  namespace: instantdeploy
  labels:
    app: instantdeploy-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instantdeploy-redis
  template:
    metadata:
      labels:
        app: instantdeploy-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: instantdeploy
spec:
  selector:
    app: instantdeploy-redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
