apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: instantdeploy-ingress
  namespace: instantdeploy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/websocket-services: instantdeploy-backend
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - instantdeploy.example.com
        - api.instantdeploy.example.com
      secretName: instantdeploy-tls-cert
  rules:
    - host: instantdeploy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: instantdeploy-frontend
                port:
                  number: 80
    - host: api.instantdeploy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: instantdeploy-backend
                port:
                  number: 8080
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: instantdeploy-cert
  namespace: instantdeploy
spec:
  secretName: instantdeploy-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: instantdeploy.example.com
  dnsNames:
    - instantdeploy.example.com
    - api.instantdeploy.example.com
