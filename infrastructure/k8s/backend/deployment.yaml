apiVersion: apps/v1
kind: Deployment
metadata:
  name: instantdeploy-backend
  namespace: instantdeploy
  labels:
    app: instantdeploy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instantdeploy-backend
  template:
    metadata:
      labels:
        app: instantdeploy-backend
    spec:
      serviceAccountName: instantdeploy-backend
      containers:
        # Main backend application
        - name: backend
          image: instantdeploy-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: instantdeploy-backend-config
            - secretRef:
                name: instantdeploy-backend-secret
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          volumeMounts:
            - name: build-workspace
              mountPath: /tmp/builds
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi

        # Docker-in-Docker sidecar for building images
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          ports:
            - containerPort: 2375
              name: docker
          volumeMounts:
            - name: build-workspace
              mountPath: /tmp/builds
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi

      volumes:
        - name: build-workspace
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
