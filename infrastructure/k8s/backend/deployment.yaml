apiVersion: apps/v1
kind: Deployment
metadata:
  name: instantdeploy-backend
  namespace: instantdeploy
  labels:
    app: instantdeploy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instantdeploy-backend
  template:
    metadata:
      labels:
        app: instantdeploy-backend
    spec:
      containers:
        - name: backend
          image: instantdeploy-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: instantdeploy-backend-config
            - secretRef:
                name: instantdeploy-backend-secret
          volumeMounts:
            - name: builds
              mountPath: /tmp/builds
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
        # Docker-in-Docker sidecar (kind nodes use containerd, not Docker)
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: builds
              mountPath: /tmp/builds
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: builds
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
