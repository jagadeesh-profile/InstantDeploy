apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: instantdeploy-network-policy
  namespace: instantdeploy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow ingress within namespace
    - from:
        - podSelector: {}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow all egress within namespace
    - to:
        - podSelector: {}
    # Allow external HTTPS (for GitHub API)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Allow external HTTP (for artifact download, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
