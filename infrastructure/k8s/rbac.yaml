apiVersion: v1
kind: ServiceAccount
metadata:
  name: instantdeploy-backend
  namespace: instantdeploy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: instantdeploy-backend
  namespace: instantdeploy
rules:
  # Allow reading pod information for sidecars/DinD
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: instantdeploy-backend
  namespace: instantdeploy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: instantdeploy-backend
subjects:
  - kind: ServiceAccount
    name: instantdeploy-backend
    namespace: instantdeploy
