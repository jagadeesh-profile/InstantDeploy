apiVersion: v1
kind: ConfigMap
metadata:
  name: instantdeploy-frontend-config
  namespace: instantdeploy
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # SPA: serve index.html for all frontend routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend (K8s service name)
        location /api {
            proxy_pass http://instantdeploy-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy WebSocket connections to backend (K8s service name)
        location /ws {
            proxy_pass http://instantdeploy-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
