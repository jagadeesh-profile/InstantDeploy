name: Code Quality Gate

on:
  pull_request:
    branches: ['main', 'develop', 'staging']

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: 'backend/go.sum'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Run backend quality gates
        run: |
          cd backend
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Backend coverage: $COVERAGE%"
          
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Error: Minimum coverage threshold (80%) not met"
            exit 1
          fi
      
      - name: Run frontend quality gates
        run: |
          cd frontend
          npm ci
          npm run test -- --coverage --watchAll=false
          
          # Check coverage
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "Frontend coverage: $COVERAGE%"
          
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "Error: Minimum coverage threshold (70%) not met"
            exit 1
          fi
      
      - name: SonarQube analysis (optional)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
      
      - name: Add quality check comment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = context.job.status === 'success' ? '✅' : '❌';
            const comment = `${status} Code Quality Gate`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
