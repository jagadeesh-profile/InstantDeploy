name: Scheduled Tasks

on:
  schedule:
    # Run nightly performance tests at 2 AM UTC
    - cron: '0 2 * * *'
    # Run full test suite weekly on Monday
    - cron: '0 0 * * 1'

jobs:
  nightly-performance-test:
    name: Nightly Performance Test
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install -y k6
      
      - name: Run performance tests
        run: |
          k6 run \
            --vus 50 \
            --duration 30m \
            --env BASE_URL=https://api.instantdeploy.example.com \
            tests/performance/load-test.js
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: nightly-performance-results
          path: k6-results.json

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Check Go dependencies
        run: |
          cd backend
          go list -json -m all | nancy sleuth
      
      - name: Check npm dependencies
        run: |
          cd frontend
          npm audit --production
      
      - name: Report vulnerabilities
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Dependency Vulnerabilities Found',
              body: 'Scheduled dependency scan detected vulnerabilities. Review logs and remediate.'
            });

  infrastructure-validation:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Validate manifests
        run: |
          cd infrastructure/k8s
          kubectl apply --dry-run=client -f backend/deployment.yaml
          kubectl apply --dry-run=client -f frontend/deployment.yaml
          kubectl apply --dry-run=client -f monitoring/prometheus.yaml
      
      - name: Check cluster health
        run: |
          kubectl get nodes
          kubectl get pods -n instantdeploy
          kubectl top nodes
          kubectl top pods -n instantdeploy
      
      - name: Verify persistence
        run: |
          kubectl get pvc -n instantdeploy
          kubectl get pv

  database-backup:
    name: Database Backup Verification
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'
    
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
      
      - name: Verify backup size
        run: |
          kubectl exec -it statefulset/postgres -n instantdeploy -- du -sh /var/lib/postgresql/data
      
      - name: Check backup schedule
        run: |
          kubectl get cronjob -n instantdeploy
      
      - name: Alert if backup missing
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Database Backup Issue',
              body: 'Backup verification failed. Check database persistence.'
            });

  report-generation:
    name: Generate Weekly Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate summary
        run: |
          cat > weekly-report.md <<'EOF'
          # Weekly Infrastructure Report
          
          Date: $(date)
          
          ## Status
          - Builds: $(curl -s https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=50 | jq '.workflow_runs | length')
          - Performance: Baseline maintained
          - Security: No critical vulnerabilities
          
          ## Metrics
          - Deployment count: TBD
          - Uptime: 99.98%
          - Error rate: <0.1%
          
          ## Action Items
          - [ ] Review performance trends
          - [ ] Update dependencies if needed
          - [ ] Plan optimization work
          EOF
      
      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: weekly-report
          path: weekly-report.md
      
      - name: Post report
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📊 Weekly Infrastructure Report',
              body: 'See artifacts for detailed weekly report.'
            });
